<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席状況確認</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 28px; color: #2ecc71; margin-bottom: 10px; }
        .success-icon { font-size: 48px; color: #2ecc71; margin-bottom: 15px; }
        p { font-size: 16px; color: #4a5568; }

        .welcome-msg { font-size: 15px; font-weight: bold; margin-bottom: 20px; color: #2c3e50; padding: 12px; background: #eef2f7; border-radius: 6px; }

        /* 教科切り替えボタンのスタイル */
        .filter-group { display: flex; justify-content: flex-start; gap: 5px; margin-top: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-filter { flex: 0 1 auto; padding: 8px 14px; font-size: 12px; font-weight: bold; background-color: #edf2f7; color: #4a5568; border: 1px solid #cbd5e0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-filter:hover { background-color: #e2e8f0; }
        .btn-filter.active { background-color: #2ecc71; color: white; border-color: #2ecc71; }

        /* 集計ボックスのスタイル */
        .summary-box { display: flex; justify-content: space-around; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .summary-item { text-align: center; }
        .summary-label { font-size: 12px; color: #718096; margin-bottom: 4px; font-weight: bold; }
        .summary-count { font-size: 20px; font-weight: bold; }
        .count-present { color: #2ecc71; }
        .count-late { color: #f1c40f; }

        /* 出席状況の表のスタイル */
        .history-section { margin-top: 15px; text-align: left; }
        .history-section h2 { font-size: 18px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: bold; }
        tr:hover { background-color: #f8fafc; }
        .no-data { text-align: center; color: #a0aec0; padding: 20px; font-style: italic; }

        /* 状態（出席・遅刻）のバッジ風デザイン */
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-present { background-color: #e8f8f5; color: #2ecc71; }
        .status-late { background-color: #fef9e7; color: #f1c40f; }

        .btn-back { display: block; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; color: white; background-color: #3498db; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logout { margin-top: 30px; display: inline-block; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">📋</div>
    <h1>出席状況確認</h1>
    <div class="welcome-msg" id="welcomeBox">読み込み中...</div>

    <div class="filter-group" id="filterGroup">
        <button class="btn-filter active" data-subject="all">すべて</button>
    </div>

    <div class="summary-box">
        <div class="summary-item">
            <div class="summary-label">出席回数</div>
            <div id="presentCount" class="summary-count count-present">0 回</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">遅刻回数</div>
            <div id="lateCount" class="summary-count count-late">0 回</div>
        </div>
    </div>

    <div class="history-section">
        <h2 id="historyTitle">あなたの出席履歴（すべて）</h2>
        <table>
            <thead>
                <tr>
                    <th>教科名</th>
                    <th>日付</th>
                    <th>状態</th>
                    <th>登録時刻</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <tr>
                    <td colspan="4" class="no-data">読み込み中...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="./attendance.html" class="btn-back">出席登録画面に戻る</a>
    <br>
    <a href="./index.html" class="logout" id="logoutLink">ログアウトしてトップへ</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain: "attendance-system-4194f.firebaseapp.com",
    projectId: "attendance-system-4194f",
    storageBucket: "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
    measurementId: "G-4Y27410MKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const studentId   = localStorage.getItem('studentId');
  const studentName = localStorage.getItem('studentName');

  if (!studentId) {
    window.location.href = './index.html';
  } else {
    document.getElementById('welcomeBox').textContent = `${studentName || studentId} さんの出席履歴`;
  }

  document.getElementById('logoutLink').addEventListener('click', () => {
    localStorage.clear();
  });

  let allRecords = []; // { subject, date, status, time }

  async function loadAttendanceHistory() {
    const tableBody = document.getElementById('historyTableBody');

    try {
      // 全授業（QRコードで作成された授業）を取得
      const classesSnap = await getDocs(collection(db, 'attendance'));

      allRecords = [];

      for (const classDoc of classesSnap.docs) {
        const cls     = classDoc.data();
        const classId = classDoc.id;
        const subject = cls.subject || '授業名なし';

        // この授業における自分の全出席記録（ドキュメントID = "YYYY-MM-DD_学籍番号"）
        const recordsSnap = await getDocs(
          query(collection(db, 'attendance', classId, 'records'), orderBy('timestamp', 'desc'))
        );

        recordsSnap.forEach(d => {
          if (d.id.endsWith('_' + studentId)) {
            const dateKey = d.id.slice(0, d.id.length - studentId.length - 1);
            const r = d.data();
            let timeString = '—';
            if (r.timestamp?.toDate) {
              const date = r.timestamp.toDate();
              const hh = String(date.getHours()).padStart(2, '0');
              const mm = String(date.getMinutes()).padStart(2, '0');
              timeString = `${hh}:${mm}`;
            }
            allRecords.push({
              subject: subject,
              date: dateKey,
              status: r.status === 'late' ? '遅刻' : '出席',
              time: timeString
            });
          }
        });
      }

      // 日付が新しい順に並べ替え
      allRecords.sort((a, b) => b.date.localeCompare(a.date));

      // 教科フィルターボタンを動的に作成
      buildFilterButtons();

      // 最初は「すべて」を表示
      displayData(allRecords);

    } catch (error) {
      console.error(error);
      tableBody.innerHTML = `<tr><td colspan="4" class="no-data" style="color:red;">履歴の読み込みに失敗しました: ${error.message}</td></tr>`;
    }
  }

  function buildFilterButtons() {
    const subjects = [...new Set(allRecords.map(r => r.subject))];
    const filterGroup = document.getElementById('filterGroup');

    filterGroup.innerHTML = `<button class="btn-filter active" data-subject="all">すべて</button>`;
    subjects.forEach(subject => {
      const btn = document.createElement('button');
      btn.className = 'btn-filter';
      btn.dataset.subject = subject;
      btn.textContent = subject;
      filterGroup.appendChild(btn);
    });

    filterGroup.querySelectorAll('.btn-filter').forEach(btn => {
      btn.addEventListener('click', (e) => {
        filterGroup.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');

        const subject = e.target.dataset.subject;
        const titleEl = document.getElementById('historyTitle');

        if (subject === 'all') {
          titleEl.textContent = 'あなたの出席履歴（すべて）';
          displayData(allRecords);
        } else {
          titleEl.textContent = `あなたの出席履歴（${subject}）`;
          displayData(allRecords.filter(r => r.subject === subject));
        }
      });
    });
  }

  // 画面にデータを表示＋回数を集計する関数
  function displayData(dataList) {
    const tableBody = document.getElementById('historyTableBody');
    tableBody.innerHTML = "";

    let presentCount = 0;
    let lateCount = 0;

    if (dataList.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="4" class="no-data">対象の出席履歴はありません</td></tr>`;
      document.getElementById('presentCount').textContent = "0 回";
      document.getElementById('lateCount').textContent = "0 回";
      return;
    }

    dataList.forEach((data) => {
      const dateDisplay = data.date.replace(/-/g, '/');

      let statusHtml = "";
      if (data.status === "遅刻") {
        statusHtml = `<span class="status-badge status-late">遅刻 (△)</span>`;
        lateCount++;
      } else {
        statusHtml = `<span class="status-badge status-present">出席 (〇)</span>`;
        presentCount++;
      }

      const row = document.createElement('tr');
      row.innerHTML = `
          <td>${escHtml(data.subject)}</td>
          <td>${dateDisplay}</td>
          <td>${statusHtml}</td>
          <td>${data.time}</td>
      `;
      tableBody.appendChild(row);
    });

    document.getElementById('presentCount').textContent = `${presentCount} 回`;
    document.getElementById('lateCount').textContent = `${lateCount} 回`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadAttendanceHistory();
</script>
</body>
</html>
