<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業QRコード</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .qr-box {
            padding: 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 18px;
        }
        .class-info-display {
            background: #ebf4ff;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 14px;
            font-size: 14px;
            line-height: 1.8;
        }
        .class-info-display span { font-weight: 700; color: #3182ce; }
        .class-id-display {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 18px;
            word-break: break-all;
        }
        .btn-print {
            padding: 10px 28px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }
        .link-back {
            display: inline-block;
            margin-top: 16px;
            font-size: 13px;
            color: #718096;
            text-decoration: none;
        }
        .loading, .error-msg { color: #a0aec0; font-size: 14px; padding: 30px; }
    </style>
</head>
<body>

<div class="card" id="card">
    <div class="loading" id="loading">読み込み中…</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
        authDomain: "attendance-system-4194f.firebaseapp.com",
        projectId: "attendance-system-4194f",
        storageBucket: "attendance-system-4194f.firebasestorage.app",
        messagingSenderId: "775610185044",
        appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const card = document.getElementById('card');

    const params = new URLSearchParams(location.search);
    const classId = params.get('classId');

    if (!classId) {
        card.innerHTML = '<div class="error-msg">授業IDが指定されていません</div>';
    } else {
        loadClass();
    }

    async function loadClass() {
        try {
            const snap = await getDoc(doc(db, 'attendance', classId));
            if (!snap.exists()) {
                card.innerHTML = '<div class="error-msg">該当する授業が見つかりませんでした</div>';
                return;
            }
            const cls = snap.data();
            const subject = cls.subject || '授業名なし';
            const date = (cls.date || '').replace(/-/g, '/');

            // sensei.html の作成時と同じ仕組みでURLを組み立てる
            const url = `${location.origin}${location.pathname.replace('qrcode.html','attendance.html')}?classId=${classId}`;

            card.innerHTML = `
                <div class="qr-box" id="qrcode"></div>
                <div class="class-info-display"><span>${escHtml(subject)}</span>　${date}</div>
                <div class="class-id-display">授業ID: ${escHtml(classId)}</div>
                <button class="btn-print" onclick="window.print()">🖨 印刷する</button>
                <br>
                <a class="link-back" href="./sensei.html">◀ 授業管理に戻る</a>
            `;

            new QRCode(document.getElementById('qrcode'), {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#2d3748',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

        } catch (e) {
            console.error(e);
            card.innerHTML = `<div class="error-msg">エラー: ${e.message}</div>`;
        }
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
