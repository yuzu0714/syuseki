<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出席登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
    .welcome { font-size: 16px; color: #555; margin-bottom: 28px; }
    .welcome span { font-weight: bold; color: #2c3e50; }

    /* 出席ボタン */
    .btn-attendance {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .btn-attendance:hover { background: #c0392b; }
    .btn-attendance:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* 出席状況確認リンク */
    .link-history {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 24px;
    }
    .link-history:hover { background: #2980b9; }

    /* 区切り線 */
    hr { border: none; border-top: 1px solid #eee; margin-bottom: 16px; }

    /* ログアウト */
    .link-logout {
      font-size: 13px;
      color: #999;
      text-decoration: none;
    }
    .link-logout:hover { color: #555; }

    /* メッセージ */
    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .msg-success { background: #E8F5E9; border-left: 4px solid #43A047; color: #2E7D32; }
    .msg-error   { background: #FFEBEE; border-left: 4px solid #E53935; color: #B71C1C; }
    .msg-info    { background: #E3F2FD; border-left: 4px solid #1565C0; color: #0D47A1; }
  </style>
</head>
<body>

<div class="container">
  <h1>📋 出席登録</h1>
  <p class="welcome">ようこそ、<span id="username"></span> さん</p>

  <!-- 出席ボタン -->
  <button class="btn-attendance" id="attendanceBtn">出席する</button>

  <!-- 出席状況確認ボタン -->
  <a href="./my_attendance.html" class="link-history">📅 これまでの出席状況を確認する</a>

  <hr>
  <a href="./index.html" class="link-logout" id="logoutBtn">ログアウト</a>

  <div class="msg" id="msgBox"></div>
</div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain:        "attendance-system-4194f.firebaseapp.com",
    projectId:         "attendance-system-4194f",
    storageBucket:     "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId:             "1:775610185044:web:e2b101da1258dc5b4ac4c1"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ログイン情報を取得
  const studentId   = localStorage.getItem('studentId');
  const studentName = localStorage.getItem('studentName');

  // 未ログインはトップへ
  if (!studentId) {
    alert("ログイン情報がありません。最初からやり直してください。");
    window.location.href = "./index.html";
  } else {
    document.getElementById('username').textContent = studentName;
  }

  // ── 出席ボタン ──────────────────────────────
  document.getElementById('attendanceBtn').addEventListener('click', async () => {
    const btn = document.getElementById('attendanceBtn');
    btn.disabled = true;

    try {
      // 本日すでに出席済みか確認
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const q = query(
        collection(db, 'attendances'),
        where('studentId', '==', studentId)
      );
      const snap = await getDocs(q);

      const alreadyToday = snap.docs.some(doc => {
        const t = doc.data().timestamp?.toDate?.() || new Date(doc.data().timestamp);
        return t >= today;
      });

      if (alreadyToday) {
        showMsg('info', '本日はすでに出席登録済みです。');
        btn.disabled = false;
        return;
      }

      // Firestore に保存
      await addDoc(collection(db, 'attendances'), {
        studentId,
        studentName,
        timestamp: new Date()
      });

      showMsg('success', '出席を記録しました！');

    } catch (e) {
      showMsg('error', '出席の記録に失敗しました。');
      console.error(e);
      btn.disabled = false;
    }
  });

  // ── ログアウト ──────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('studentId');
    localStorage.removeItem('studentName');
    localStorage.removeItem('userRole');
  });

  // ── メッセージ表示 ──────────────────────────
  function showMsg(type, text) {
    const box = document.getElementById('msgBox');
    box.className = 'msg msg-' + type;
    box.textContent = text;
    box.style.display = 'block';
  }
</script>

</body>
</html>
