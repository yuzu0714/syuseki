<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出席登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 22px; color: #2c3e50; margin-bottom: 8px; }
    .welcome { font-size: 16px; color: #555; margin-bottom: 20px; }
    .welcome span { font-weight: bold; color: #2c3e50; }

    /* 授業情報表示 */
    .class-info {
      background: #ebf4ff;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.8;
      text-align: left;
    }
    .class-info .subject { font-weight: 700; color: #3182ce; font-size: 16px; }
    .class-info .date { color: #718096; font-size: 13px; }
    .no-class {
      background: #fff5f5;
      color: #c53030;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    /* 出席ボタン */
    .btn-attendance {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .btn-attendance:hover { background: #c0392b; }
    .btn-attendance:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* 出席状況確認リンク */
    .link-history {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 24px;
    }
    .link-history:hover { background: #2980b9; }

    /* 区切り線 */
    hr { border: none; border-top: 1px solid #eee; margin-bottom: 16px; }

    /* ログアウト */
    .link-logout {
      font-size: 13px;
      color: #999;
      text-decoration: none;
    }
    .link-logout:hover { color: #555; }

    /* メッセージ */
    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .msg-success { background: #E8F5E9; border-left: 4px solid #43A047; color: #2E7D32; }
    .msg-error   { background: #FFEBEE; border-left: 4px solid #E53935; color: #B71C1C; }
    .msg-info    { background: #E3F2FD; border-left: 4px solid #1565C0; color: #0D47A1; }
  </style>
</head>
<body>

<div class="container">
  <h1>📋 出席登録</h1>
  <p class="welcome">ようこそ、<span id="username"></span> さん</p>

  <!-- 授業情報 -->
  <div id="classInfoArea"></div>

  <!-- 出席ボタン -->
  <button class="btn-attendance" id="attendanceBtn" disabled>出席する</button>

  <!-- 出席状況確認ボタン -->
  <a href="./history.html" class="link-history">📅 これまでの出席状況を確認する</a>

  <hr>
  <a href="./index.html" class="link-logout" id="logoutBtn">ログアウト</a>

  <div class="msg" id="msgBox"></div>
</div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain:        "attendance-system-4194f.firebaseapp.com",
    projectId:         "attendance-system-4194f",
    storageBucket:     "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId:             "1:775610185044:web:e2b101da1258dc5b4ac4c1"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ログイン情報を取得
  const studentId   = localStorage.getItem('studentId');
  const studentName = localStorage.getItem('studentName');

  // 未ログインはトップへ
  if (!studentId) {
    alert("ログイン情報がありません。最初からやり直してください。");
    window.location.href = "./index.html";
  } else {
    document.getElementById('username').textContent = studentName;
  }

  // URLから授業IDを取得（QRコードを読み取った場合）
  const params = new URLSearchParams(location.search);
  const classId = params.get('classId');

  const classInfoArea = document.getElementById('classInfoArea');
  const attendanceBtn = document.getElementById('attendanceBtn');

  let currentClass = null;

  async function init() {
    if (!classId) {
      classInfoArea.innerHTML = `<div class="no-class">授業のQRコードを読み取ってアクセスしてください</div>`;
      return;
    }

    try {
      const classSnap = await getDoc(doc(db, 'attendance', classId));

      if (!classSnap.exists()) {
        classInfoArea.innerHTML = `<div class="no-class">該当する授業が見つかりませんでした</div>`;
        return;
      }

      currentClass = classSnap.data();
      const subject = currentClass.subject || '授業名なし';
      const todayDisplay = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

      classInfoArea.innerHTML = `
        <div class="class-info">
          <div class="subject">${escHtml(subject)}</div>
          <div class="date">${todayDisplay}</div>
        </div>`;

      // 本日すでに出席済みか確認（レコードID = "YYYY-MM-DD_studentId"）
      const todayStr = new Date().toISOString().split('T')[0];
      const recordId = `${todayStr}_${studentId}`;
      const recordRef = doc(db, 'attendance', classId, 'records', recordId);
      const recordSnap = await getDoc(recordRef);

      if (recordSnap.exists()) {
        attendanceBtn.disabled = true;
        attendanceBtn.textContent = '本日は出席登録済み';
        showMsg('info', '本日はすでに出席登録済みです。');
      } else {
        attendanceBtn.disabled = false;
      }

    } catch (e) {
      console.error(e);
      classInfoArea.innerHTML = `<div class="no-class">エラー: ${e.message}</div>`;
    }
  }

  // ── 出席ボタン ──────────────────────────────
  attendanceBtn.addEventListener('click', async () => {
    if (!classId || !currentClass) return;

    attendanceBtn.disabled = true;

    try {
      const todayStr = new Date().toISOString().split('T')[0];
      const recordId = `${todayStr}_${studentId}`;
      const recordRef = doc(db, 'attendance', classId, 'records', recordId);
      const recordSnap = await getDoc(recordRef);

      if (recordSnap.exists()) {
        showMsg('info', '本日はすでに出席登録済みです。');
        attendanceBtn.textContent = '本日は出席登録済み';
        return;
      }

      await setDoc(recordRef, {
        name: studentName,
        status: 'present',
        timestamp: new Date()
      });

      showMsg('success', '出席を記録しました！');
      attendanceBtn.textContent = '本日は出席登録済み';

    } catch (e) {
      showMsg('error', '出席の記録に失敗しました。');
      console.error(e);
      attendanceBtn.disabled = false;
    }
  });

  // ── ログアウト ──────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('studentId');
    localStorage.removeItem('studentName');
    localStorage.removeItem('userRole');
  });

  // ── メッセージ表示 ──────────────────────────
  function showMsg(type, text) {
    const box = document.getElementById('msgBox');
    box.className = 'msg msg-' + type;
    box.textContent = text;
    box.style.display = 'block';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>

</body>
</html>
