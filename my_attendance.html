<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>出席確認</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
    padding: 30px 20px;
  }

  header {
    max-width: 600px;
    margin: 0 auto 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  .user-info { font-size: 13px; color: #718096; }
  .logout-btn {
    background: none;
    border: 1px solid #e2e8f0;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: #718096;
    cursor: pointer;
  }
  .logout-btn:hover { background: #f7fafc; }

  .card {
    max-width: 600px;
    margin: 0 auto 20px;
    background: white;
    border-radius: 12px;
    padding: 22px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* サマリー */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 600px;
    margin: 0 auto 20px;
  }
  .stat-card {
    background: white;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .stat-card .num {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card .lbl {
    font-size: 11px;
    color: #a0aec0;
    margin-top: 5px;
  }
  .num-present { color: #38a169; }
  .num-late    { color: #d69e2e; }
  .num-absent  { color: #e53e3e; }

  /* 授業カード */
  .section-label {
    max-width: 600px;
    margin: 0 auto 10px;
    font-size: 11px;
    font-weight: 700;
    color: #a0aec0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .class-card {
    max-width: 600px;
    margin: 0 auto 14px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    overflow: hidden;
  }

  .class-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .class-header:hover { background: #fafafa; }
  .class-header.open { border-bottom: 1px solid #f0f4f8; }

  .class-title { font-size: 15px; font-weight: 700; color: #2d3748; }
  .class-date  { font-size: 12px; color: #a0aec0; margin-top: 2px; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .pill-present { background: #c6f6d5; color: #276749; }
  .pill-late    { background: #fefcbf; color: #744210; }
  .pill-absent  { background: #fed7d7; color: #9b2c2c; }

  .mark { font-size: 16px; }

  .chevron {
    margin-left: 10px;
    color: #cbd5e0;
    transition: transform 0.2s;
    font-size: 12px;
  }
  .chevron.open { transform: rotate(180deg); }

  .class-body {
    display: none;
    padding: 14px 20px 16px;
    background: #fafafa;
  }
  .class-body.open { display: block; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 1px solid #edf2f7;
    color: #4a5568;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: #a0aec0; font-size: 12px; }

  .loading { text-align: center; color: #a0aec0; padding: 40px; font-size: 14px; }
  .empty   { text-align: center; color: #a0aec0; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>出席確認</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="user-info" id="headerName"></span>
    <button class="logout-btn" id="logoutBtn">ログアウト</button>
  </div>
</header>

<div id="summaryArea"></div>
<div id="listArea"><div class="loading">読み込み中…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
  authDomain: "attendance-system-4194f.firebaseapp.com",
  projectId: "attendance-system-4194f",
  storageBucket: "attendance-system-4194f.firebasestorage.app",
  messagingSenderId: "775610185044",
  appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ログインチェック
const studentId   = localStorage.getItem('studentId');
const studentName = localStorage.getItem('studentName');
if (!studentId) { window.location.href = './login.html'; }

document.getElementById('headerName').textContent = (studentName || studentId) + ' さん';
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.clear();
  window.location.href = './index.html';
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function statusPill(status) {
  if (status === 'present') return `<span class="status-pill pill-present"><span class="mark">○</span>出席</span>`;
  if (status === 'late')    return `<span class="status-pill pill-late"><span class="mark">△</span>遅刻</span>`;
  return                           `<span class="status-pill pill-absent"><span class="mark">✕</span>欠席</span>`;
}

window.toggleCard = (id) => {
  const body   = document.getElementById('body_' + id);
  const chev   = document.getElementById('chev_' + id);
  const header = document.getElementById('hdr_'  + id);
  const open   = body.classList.contains('open');
  body.classList.toggle('open', !open);
  chev.classList.toggle('open', !open);
  header.classList.toggle('open', !open);
};

async function load() {
  const summaryArea = document.getElementById('summaryArea');
  const listArea    = document.getElementById('listArea');

  try {
    // 全授業を日付降順で取得
    const classesSnap = await getDocs(query(collection(db, 'attendance'), orderBy('date', 'desc')));

    if (classesSnap.empty) {
      listArea.innerHTML = '<div class="empty">授業データがまだありません</div>';
      return;
    }

    let presentCount = 0, lateCount = 0, absentCount = 0;
    let cardsHtml = '';

    for (const classDoc of classesSnap.docs) {
      const cls     = classDoc.data();
      const classId = classDoc.id;
      const subject = escHtml(cls.subject || '授業名なし');
      const date    = (cls.date || '').replace(/-/g, '/');

      // この授業における自分の出席記録を取得
      const recordRef  = doc(db, 'attendance', classId, 'records', studentId);
      const recordSnap = await getDoc(recordRef);

      let status = 'absent';
      let timeStr = '—';

      if (recordSnap.exists()) {
        const r = recordSnap.data();
        status  = r.status === 'late' ? 'late' : 'present';
        if (r.timestamp?.toDate) {
          timeStr = r.timestamp.toDate().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        }
      }

      if (status === 'present') presentCount++;
      else if (status === 'late') lateCount++;
      else absentCount++;

      const cardId = classId.replace(/[^a-z0-9]/gi, '_');

      cardsHtml += `
      <div class="class-card">
        <div class="class-header" id="hdr_${cardId}" onclick="toggleCard('${cardId}')">
          <div>
            <div class="class-title">${subject}</div>
            <div class="class-date">${date}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${statusPill(status)}
            <span class="chevron" id="chev_${cardId}">▼</span>
          </div>
        </div>
        <div class="class-body" id="body_${cardId}">
          <div class="detail-row">
            <span class="detail-label">日付</span>
            <span>${date}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">出席状況</span>
            <span>${statusPill(status)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">登録時刻</span>
            <span>${timeStr}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">担当教員</span>
            <span>${escHtml(cls.teacherName || '—')}</span>
          </div>
        </div>
      </div>`;
    }

    const total = presentCount + lateCount + absentCount;

    summaryArea.innerHTML = `
    <div class="summary-grid">
      <div class="stat-card">
        <div class="num num-present">${presentCount}</div>
        <div class="lbl">出席 ○</div>
      </div>
      <div class="stat-card">
        <div class="num num-late">${lateCount}</div>
        <div class="lbl">遅刻 △</div>
      </div>
      <div class="stat-card">
        <div class="num num-absent">${absentCount}</div>
        <div class="lbl">欠席 ✕</div>
      </div>
    </div>`;

    listArea.innerHTML = `<div class="section-label">授業ごとの出席状況（全 ${total} 回）</div>` + cardsHtml;

  } catch(e) {
    console.error(e);
    listArea.innerHTML = `<div class="empty">エラー: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
