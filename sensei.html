<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業管理 - 先生用</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
            padding: 30px 20px;
        }
        header {
            max-width: 600px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 20px; font-weight: 700; color: #2d3748; }
        .user-info { font-size: 13px; color: #718096; }

        .card {
            max-width: 600px;
            margin: 0 auto 24px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: #4a5568; border-left: 4px solid #667eea; padding-left: 10px; }

        label { font-size: 13px; font-weight: 600; color: #4a5568; display: block; margin-bottom: 6px; }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #667eea; outline: none; }

        .btn-create {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-create:hover { opacity: 0.9; }

        /* QRコード表示エリア */
        #qrSection { display: none; }
        .qr-box {
            text-align: center;
            padding: 20px 0;
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .class-info-display {
            background: #ebf4ff;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.8;
        }
        .class-info-display span { font-weight: 700; color: #3182ce; }
        .class-id-display {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 16px;
            word-break: break-all;
        }
        .btn-print {
            padding: 10px 28px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-reset {
            padding: 10px 28px;
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 出席リスト */
        #attendanceList { display: none; }
        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .attendance-table th {
            background: #f7fafc;
            padding: 10px 12px;
            text-align: left;
            font-size: 12px;
            color: #718096;
            border-bottom: 1px solid #e2e8f0;
        }
        .attendance-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f4f8;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-present { background: #c6f6d5; color: #276749; }
        .badge-late    { background: #fefcbf; color: #744210; }

        .empty-msg { text-align: center; color: #a0aec0; padding: 30px; font-size: 14px; }
        .count-display { font-size: 13px; color: #718096; margin-bottom: 12px; }

        .logout-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: #718096;
            cursor: pointer;
        }

        /* 授業別出席状況 */
        .overview-card { margin-top: 8px; }
        .overview-card h2 { margin-bottom: 14px; }

        .class-block { margin-bottom: 28px; }
        .class-block-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea22;
        }
        .class-block-title {
            font-size: 15px;
            font-weight: 700;
            color: #2d3748;
        }
        .class-block-date {
            font-size: 12px;
            color: #a0aec0;
        }
        .class-block-count {
            margin-left: auto;
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }
        .qr-link-btn {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            background: #ebf4ff;
            border: none;
            padding: 4px 12px;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }
        .qr-link-btn:hover { background: #d6e8ff; }

        .overview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .overview-table th {
            background: #f7fafc;
            padding: 8px 12px;
            text-align: left;
            font-size: 11px;
            color: #718096;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
        }
        .overview-table td {
            padding: 9px 12px;
            border-bottom: 1px solid #f0f4f8;
            vertical-align: middle;
        }
        .overview-table tr:last-child td { border-bottom: none; }

        .mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            font-size: 18px;
            line-height: 1;
        }
        .mark-present { color: #2f855a; }
        .mark-late    { color: #b7791f; }
        .mark-absent  { color: #c53030; }

        .overview-empty {
            text-align: center;
            color: #a0aec0;
            padding: 24px;
            font-size: 13px;
        }

        .btn-refresh {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 5px 13px;
            border-radius: 6px;
            font-size: 12px;
            color: #718096;
            cursor: pointer;
            margin-left: auto;
            display: block;
            margin-bottom: 12px;
        }
        .btn-refresh:hover { background: #f7fafc; }

        .loading-msg {
            text-align: center;
            color: #a0aec0;
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <h1>📋 授業管理</h1>
    <div style="display:flex;align-items:center;gap:12px;">
        <span class="user-info" id="teacherName">先生</span>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
</header>

<!-- 授業作成カード -->
<div class="card">
    <h2>授業を作成する</h2>
    <div id="createSection">
        <label for="subjectName">授業名</label>
        <input type="text" id="subjectName" placeholder="例: 情報工学、電子回路1">

        <label for="classDate">日付</label>
        <input type="date" id="classDate">

        <button class="btn-create" onclick="createClass()">QRコードを生成する</button>
    </div>

    <div id="qrSection">
        <div class="qr-box">
            <div id="qrcode"></div>
            <div class="class-info-display" id="classInfoDisplay"></div>
            <div class="class-id-display" id="classIdDisplay"></div>
            <button class="btn-print" onclick="window.print()">🖨 印刷する</button>
            <button class="btn-reset" onclick="resetForm()">別の授業を作成</button>
        </div>
    </div>
</div>

<!-- 出席者リストカード -->
<div class="card" id="attendanceList">
    <h2>出席者リスト</h2>
    <div class="count-display" id="countDisplay"></div>
    <table class="attendance-table">
        <thead>
            <tr>
                <th>学籍番号</th>
                <th>氏名</th>
                <th>状態</th>
                <th>登録時刻</th>
            </tr>
        </thead>
        <tbody id="attendanceBody">
            <tr><td colspan="4" class="empty-msg">まだ出席者はいません</td></tr>
        </tbody>
    </table>
</div>

<!-- 授業別出席状況カード -->
<div class="card overview-card">
    <h2>授業別 出席状況</h2>
    <button class="btn-refresh" onclick="loadOverview()">↻ 更新</button>
    <div id="overviewContainer"><div class="loading-msg">読み込み中…</div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
        authDomain: "attendance-system-4194f.firebaseapp.com",
        projectId: "attendance-system-4194f",
        storageBucket: "attendance-system-4194f.firebasestorage.app",
        messagingSenderId: "775610185044",
        appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ログインチェック
    const teacherName = localStorage.getItem('studentName');
    const role = localStorage.getItem('userRole');
    if (!teacherName || role !== 'teacher') {
        alert('先生としてログインしてください');
        window.location.href = './login.html';
    }
    document.getElementById('teacherName').textContent = teacherName + ' 先生';

    // 今日の日付をデフォルトセット
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('classDate').value = today;

    let unsubscribe = null;

    window.createClass = async function() {
        const subject = document.getElementById('subjectName').value.trim();
        const date = document.getElementById('classDate').value;
        if (!subject) { alert('授業名を入力してください'); return; }
        if (!date)    { alert('日付を選択してください'); return; }

        // 授業IDを自動生成（例: 20260624-abc12）
        const randomStr = Math.random().toString(36).slice(2, 7);
        const dateStr = date.replace(/-/g, '');
        const classId = `${dateStr}-${randomStr}`;

        // Firestoreに授業を保存
        await setDoc(doc(db, 'attendance', classId), {
            subject: subject,
            date: date,
            teacherId: localStorage.getItem('studentId'),
            teacherName: teacherName,
            createdAt: new Date()
        });

        // QRコード生成
        const url = `${location.origin}${location.pathname.replace('sensei.html','attendance.html')}?classId=${classId}`;
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
            text: url,
            width: 200,
            height: 200,
            colorDark: '#2d3748',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        document.getElementById('classInfoDisplay').innerHTML =
            `<span>${subject}</span>　${date.replace(/-/g,'/')}`;
        document.getElementById('classIdDisplay').textContent = `授業ID: ${classId}`;

        document.getElementById('createSection').style.display = 'none';
        document.getElementById('qrSection').style.display = 'block';

        // 出席リストのリアルタイム監視
        document.getElementById('attendanceList').style.display = 'block';
        const recordsRef = collection(db, 'attendance', classId, 'records');
        if (unsubscribe) unsubscribe();
        unsubscribe = onSnapshot(query(recordsRef, orderBy('timestamp')), (snapshot) => {
            const tbody = document.getElementById('attendanceBody');
            const count = snapshot.size;
            document.getElementById('countDisplay').textContent = `出席: ${count}人`;
            if (count === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">まだ出席者はいません</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            snapshot.forEach(d => {
                const r = d.data();
                const time = r.timestamp?.toDate().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) ?? '-';
                const badge = r.status === 'late'
                    ? '<span class="badge badge-late">遅刻</span>'
                    : '<span class="badge badge-present">出席</span>';
                tbody.innerHTML += `
                    <tr>
                        <td>${d.id}</td>
                        <td>${r.name}</td>
                        <td>${badge}</td>
                        <td>${time}</td>
                    </tr>`;
            });
        });
    };

    window.resetForm = function() {
        if (unsubscribe) unsubscribe();
        document.getElementById('subjectName').value = '';
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('createSection').style.display = 'block';
        document.getElementById('qrSection').style.display = 'none';
        document.getElementById('attendanceList').style.display = 'none';
    };

    window.logout = function() {
        localStorage.clear();
        window.location.href = './index.html';
    };

    // ---- 授業別出席状況 ----
    window.loadOverview = async function() {
        const container = document.getElementById('overviewContainer');
        container.innerHTML = '<div class="loading-msg">読み込み中…</div>';

        try {
            // 全授業を取得
            const { getDocs: _getDocs, collection: _col, query: _q, orderBy: _ob, collectionGroup } =
                await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

            const classesSnap = await _getDocs(_q(_col(db, 'attendance'), _ob('date', 'desc')));

            if (classesSnap.empty) {
                container.innerHTML = '<div class="overview-empty">授業がまだありません</div>';
                return;
            }

            // 全学生リストを取得（users コレクション）
            const usersSnap = await _getDocs(_col(db, 'users'));
            const allStudents = {};
            usersSnap.forEach(d => {
                const u = d.data();
                if (u.role !== 'teacher') allStudents[d.id] = u.name || d.id;
            });
            const studentIds = Object.keys(allStudents);

            let html = '';

            for (const classDoc of classesSnap.docs) {
                const cls = classDoc.data();
                const classId = classDoc.id;

                // この授業の出席記録を取得
                const recordsSnap = await _getDocs(
                    _q(_col(db, 'attendance', classId, 'records'), _ob('timestamp'))
                );
                const records = {};
                recordsSnap.forEach(d => { records[d.id] = d.data(); });

                const presentCount = Object.keys(records).length;
                const totalCount = studentIds.length;

                html += `
                <div class="class-block">
                    <div class="class-block-header">
                        <span class="class-block-title">${escHtml(cls.subject || '授業名なし')}</span>
                        <span class="class-block-date">${(cls.date || '').replace(/-/g, '/')}</span>
                        <a class="qr-link-btn" href="./qrcode.html?classId=${encodeURIComponent(classId)}" target="_blank">📱 QRコード</a>
                        <span class="class-block-count">出席 ${presentCount} / ${totalCount} 人</span>
                    </div>
                    <table class="overview-table">
                        <thead>
                            <tr>
                                <th>学籍番号</th>
                                <th>氏名</th>
                                <th>出席状況</th>
                                <th>登録時刻</th>
                            </tr>
                        </thead>
                        <tbody>`;

                if (studentIds.length === 0) {
                    html += `<tr><td colspan="4" class="overview-empty">学生データなし</td></tr>`;
                } else {
                    studentIds.forEach(sid => {
                        const name = allStudents[sid];
                        const rec = records[sid];
                        let mark, markClass, timeStr;
                        if (!rec) {
                            mark = '✕'; markClass = 'mark-absent'; timeStr = '—';
                        } else if (rec.status === 'late') {
                            mark = '△'; markClass = 'mark-late';
                            timeStr = rec.timestamp?.toDate().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) ?? '—';
                        } else {
                            mark = '○'; markClass = 'mark-present';
                            timeStr = rec.timestamp?.toDate().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) ?? '—';
                        }
                        html += `
                            <tr>
                                <td>${escHtml(sid)}</td>
                                <td>${escHtml(name)}</td>
                                <td><span class="mark ${markClass}">${mark}</span></td>
                                <td style="color:#718096;font-size:12px;">${timeStr}</td>
                            </tr>`;
                    });
                }

                html += `</tbody></table></div>`;
            }

            container.innerHTML = html;

        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="overview-empty">エラー: ${e.message}</div>`;
        }
    };

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 初回自動ロード
    loadOverview();
</script>

</body>
</html>
