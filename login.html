<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
        body { font-family: sans-serif; padding: 30px 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .link-back { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>ログイン</h1>
    <form id="loginForm">
        <label for="loginId">ID（学籍番号など）</label>
        <input type="text" id="loginId" placeholder="登録したIDを入力" required>
        <button type="submit" class="btn-submit">ログイン</button>
    </form>
    <a href="./index.html" class="link-back">◀ トップに戻る</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDStU4e3_ncsos4obCXpVAt4SaitfKSpk4",
    authDomain: "attendance-system-4194f.firebaseapp.com",
    projectId: "attendance-system-4194f",
    storageBucket: "attendance-system-4194f.firebasestorage.app",
    messagingSenderId: "775610185044",
    appId: "1:775610185044:web:e2b101da1258dc5b4ac4c1",
    measurementId: "G-4Y27410MKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();
    const loginId = document.getElementById('loginId').value;

    try {
      const userRef = doc(db, "users", loginId);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const userData = userSnap.data();
        localStorage.setItem('studentId', loginId);
        localStorage.setItem('studentName', userData.name);
        localStorage.setItem('userRole', userData.role);

        alert(`ログインしました！こんにちは、${userData.name}さん。`);

        // 区分を確認して自動振り分け
        if (userData.role === 'teacher') {
            window.location.href = './sensei.html';
        } else {
            window.location.href = './attendance.html';
        }
      } else {
        alert("IDが見つかりません。");
      }
    } catch (error) {
      alert("ログインに失敗しました。");
    }
  });
</script>
</body>
</html>
